<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body class="flex items-center justify-center h-screen bg-gray-300">
      <form class="rounded-2xl p-10 flex-col flex space-y-5 bg-white">
        <p class="text-blue-600 text-2xl text-center font-bold">Login Now</p>
        <label for="email">Email:</label>
        <input
          id="email"
          type="text"
          placeholder="Enter Your Email"
          class="p-3 bg-gray-300 rounded-sm outline-blue-400"
        />

        <label for="pass">Password:</label>
        <input
          id="pass"
          type="text"
          placeholder="Enter Your Password"
          class="p-3 bg-gray-300 rounded-sm outline-blue-400"
        />

        <div class="flex items-center gap-3">
          <input id="remember-me" type="checkbox" class="size-3.5"/>
          <label for="remember-me">Remember Me</label>
        </div>

        <button class="p-3 bg-blue-500 rounded-3xl max-w-full text-white font-bold">Log In</button>

        <div class="flex flex-row space-x-12">
          <a href="#" class="decoration-0 text-blue-600">Don't have an account?</a>
          <a href="#" class="decoration-0 text-blue-600">Forgot Password?</a>
        </div>
      </form>
  </body>
</html>
